introText: |
  Du är välkommen att prova på bågskyttning hos Sigtuna Bågskytteklubb!
  Du provar på 3 gånger för 100 kr – sedan bestämmer du om du vill bli medlem.
  Provavgiften dras av från din första medlemsavgift.
whatToExpectText: |
  Under provtillfällena lär du dig grunderna i bågskyttning – hur man skjuter säkert,
  hur man hanterar utrustningen och grundläggande teknik. Vi har erfarna skyttar som
  hjälper dig komma igång.
equipmentProvidedText: |
  All utrustning tillhandahålls av klubben – du behöver inte ta med dig något.
  Om du väljer att bli permanent medlem brukar det vara bra att med tiden skaffa egna pilar.
